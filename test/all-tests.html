<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国战记 - 完整测试套件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { 
            margin-bottom: 10px; 
            color: #e94560;
            font-size: 32px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        .btn:disabled { 
            background: #666; 
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
        .card .value {
            font-size: 36px;
            font-weight: bold;
        }
        .value.pass { color: #2ecc71; }
        .value.fail { color: #e74c3c; }
        .value.pending { color: #f39c12; }
        .value.total { color: #3498db; }
        .test-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-section h2 {
            color: #4ecca3;
            margin-bottom: 15px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .test-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
            border-left: 3px solid transparent;
        }
        .test-item.pass { border-left-color: #2ecc71; }
        .test-item.fail { border-left-color: #e74c3c; }
        .test-item .status {
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        .status.pass { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status.fail { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.3s;
            width: 0%;
        }
        .log {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 20px;
        }
        .log-item { margin: 5px 0; }
        .log-info { color: #4ecca3; }
        .log-error { color: #e74c3c; }
        .log-success { color: #2ecc71; }
        .report-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }
        .report-section h2 {
            color: #f39c12;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            background: rgba(255,255,255,0.05);
            color: #4ecca3;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-high { background: #e74c3c; color: #fff; }
        .badge-medium { background: #f39c12; color: #fff; }
        .badge-low { background: #3498db; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 三国战记 - 完整测试套件</h1>
        <p class="subtitle">单元测试 | 集成测试 | 性能测试 | E2E 测试</p>
        
        <div class="controls">
            <button class="btn" onclick="runAllTests()">▶️ 运行全部测试</button>
            <button class="btn btn-secondary" onclick="runUnitTests()">📝 单元测试</button>
            <button class="btn btn-secondary" onclick="runIntegrationTests()">🔗 集成测试</button>
            <button class="btn btn-secondary" onclick="runPerformanceTests()">⚡ 性能测试</button>
            <button class="btn btn-success" onclick="generateReport()">📊 生成报告</button>
            <button class="btn" onclick="resetTests()">🔄 重置</button>
        </div>
        
        <div class="summary-cards">
            <div class="card">
                <h3>总计</h3>
                <div class="value total" id="total-count">0</div>
            </div>
            <div class="card">
                <h3>通过</h3>
                <div class="value pass" id="pass-count">0</div>
            </div>
            <div class="card">
                <h3>失败</h3>
                <div class="value fail" id="fail-count">0</div>
            </div>
            <div class="card">
                <h3>通过率</h3>
                <div class="value" id="pass-rate">0%</div>
            </div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        <div id="results"></div>
        
        <div class="report-section" id="report-section" style="display: none;">
            <h2>📊 测试报告</h2>
            <div id="report-content"></div>
        </div>
        
        <div class="log" id="log"></div>
    </div>
    
    <script>
        let allResults = {
            unit: { passed: 0, failed: 0, results: [] },
            integration: { passed: 0, failed: 0, results: [] },
            performance: { passed: 0, failed: 0, results: [], metrics: {} }
        };
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const item = document.createElement('div');
            item.className = `log-item log-${type}`;
            const time = new Date().toLocaleTimeString();
            item.textContent = `[${time}] ${message}`;
            logDiv.appendChild(item);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function updateSummary() {
            let total = 0, passed = 0, failed = 0;
            
            ['unit', 'integration', 'performance'].forEach(type => {
                total += allResults[type].passed + allResults[type].failed;
                passed += allResults[type].passed;
                failed += allResults[type].failed;
            });
            
            document.getElementById('total-count').textContent = total;
            document.getElementById('pass-count').textContent = passed;
            document.getElementById('fail-count').textContent = failed;
            
            const rate = total > 0 ? ((passed / total) * 100).toFixed(1) : 0;
            document.getElementById('pass-rate').textContent = rate + '%';
            
            const progress = total > 0 ? (passed / total) * 100 : 0;
            document.getElementById('progress-fill').style.width = progress + '%';
        }
        
        function createSection(title, icon) {
            const div = document.createElement('div');
            div.className = 'test-section';
            div.id = `section-${title.replace(/\s+/g, '-')}`;
            div.innerHTML = `<h2>${icon} ${title}</h2>`;
            document.getElementById('results').appendChild(div);
            return div;
        }
        
        function addTestResult(section, name, status, error = '') {
            const sectionDiv = document.getElementById(`section-${section}`) || createSection(section, '📋');
            const item = document.createElement('div');
            item.className = `test-item ${status}`;
            item.innerHTML = `
                <span>${name}</span>
                <span class="status ${status}">${status === 'pass' ? '✓ PASS' : '✗ FAIL'}</span>
            `;
            sectionDiv.appendChild(item);
        }
        
        function runUnitTests() {
            log('开始运行单元测试...', 'info');
            document.getElementById('results').innerHTML = '';
            
            try {
                // Input 测试
                const inputTests = new window.InputTests();
                const inputResult = inputTests.run();
                allResults.unit.passed += inputResult.passed;
                allResults.unit.failed += inputResult.failed;
                inputResult.results.forEach(r => addTestResult('Input 模块测试', r.name, r.status, r.error));
                
                // GameLoop 测试
                const gameLoopTests = new window.GameLoopTests();
                const gameLoopResult = gameLoopTests.run();
                allResults.unit.passed += gameLoopResult.passed;
                allResults.unit.failed += gameLoopResult.failed;
                gameLoopResult.results.forEach(r => addTestResult('GameLoop 模块测试', r.name, r.status, r.error));
                
                // Player 测试
                const playerTests = new window.PlayerTests();
                const playerResult = playerTests.run();
                allResults.unit.passed += playerResult.passed;
                allResults.unit.failed += playerResult.failed;
                playerResult.results.forEach(r => addTestResult('Player 模块测试', r.name, r.status, r.error));
                
                // Enemy 测试
                const enemyTests = new window.EnemyTests();
                const enemyResult = enemyTests.run();
                allResults.unit.passed += enemyResult.passed;
                allResults.unit.failed += enemyResult.failed;
                enemyResult.results.forEach(r => addTestResult('Enemy 模块测试', r.name, r.status, r.error));
                
                // HUD 测试
                const hudTests = new window.HUDTests();
                const hudResult = hudTests.run();
                allResults.unit.passed += hudResult.passed;
                allResults.unit.failed += hudResult.failed;
                hudResult.results.forEach(r => addTestResult('HUD 模块测试', r.name, r.status, r.error));
                
                // Skill 测试
                const skillTests = new window.SkillTests();
                const skillResult = skillTests.run();
                allResults.unit.passed += skillResult.passed;
                allResults.unit.failed += skillResult.failed;
                skillResult.results.forEach(r => addTestResult('Skill 模块测试', r.name, r.status, r.error));
                
                log('单元测试完成!', 'success');
            } catch (e) {
                log('单元测试错误：' + e.message, 'error');
            }
            
            updateSummary();
        }
        
        function runIntegrationTests() {
            log('开始运行集成测试...', 'info');
            document.getElementById('results').innerHTML = '';
            
            try {
                // 碰撞测试
                const collisionTests = new window.CollisionTests();
                const collisionResult = collisionTests.run();
                allResults.integration.passed += collisionResult.passed;
                allResults.integration.failed += collisionResult.failed;
                collisionResult.results.forEach(r => addTestResult('碰撞检测测试', r.name, r.status, r.error));
                
                // 战斗测试
                const combatTests = new window.CombatTests();
                const combatResult = combatTests.run();
                allResults.integration.passed += combatResult.passed;
                allResults.integration.failed += combatResult.failed;
                combatResult.results.forEach(r => addTestResult('战斗系统测试', r.name, r.status, r.error));
                
                // 场景测试
                const sceneTests = new window.SceneTests();
                const sceneResult = sceneTests.run();
                allResults.integration.passed += sceneResult.passed;
                allResults.integration.failed += sceneResult.failed;
                sceneResult.results.forEach(r => addTestResult('场景管理测试', r.name, r.status, r.error));
                
                log('集成测试完成!', 'success');
            } catch (e) {
                log('集成测试错误：' + e.message, 'error');
            }
            
            updateSummary();
        }
        
        function runPerformanceTests() {
            log('开始运行性能测试...', 'info');
            document.getElementById('results').innerHTML = '';
            
            try {
                const perfTests = new window.PerformanceTests();
                const perfResult = perfTests.run();
                allResults.performance.passed += perfResult.passed;
                allResults.performance.failed += perfResult.failed;
                allResults.performance.metrics = perfResult.metrics;
                perfResult.results.forEach(r => addTestResult('性能测试', r.name, r.status, r.error));
                
                log('性能测试完成!', 'success');
            } catch (e) {
                log('性能测试错误：' + e.message, 'error');
            }
            
            updateSummary();
        }
        
        function runAllTests() {
            log('开始运行全部测试...', 'info');
            document.getElementById('results').innerHTML = '';
            allResults = {
                unit: { passed: 0, failed: 0, results: [] },
                integration: { passed: 0, failed: 0, results: [] },
                performance: { passed: 0, failed: 0, results: [], metrics: {} }
            };
            
            setTimeout(() => {
                runUnitTests();
                setTimeout(() => {
                    runIntegrationTests();
                    setTimeout(() => {
                        runPerformanceTests();
                        log('全部测试完成!', 'success');
                    }, 500);
                }, 500);
            }, 100);
        }
        
        function generateReport() {
            const reportSection = document.getElementById('report-section');
            const reportContent = document.getElementById('report-content');
            
            let total = 0, passed = 0, failed = 0;
            ['unit', 'integration', 'performance'].forEach(type => {
                total += allResults[type].passed + allResults[type].failed;
                passed += allResults[type].passed;
                failed += allResults[type].failed;
            });
            
            const rate = total > 0 ? ((passed / total) * 100).toFixed(1) : 0;
            const timestamp = new Date().toLocaleString('zh-CN');
            
            let html = `
                <p><strong>测试时间:</strong> ${timestamp}</p>
                <p><strong>总计:</strong> ${total} 项测试 | 
                   <span style="color:#2ecc71">通过 ${passed}</span> | 
                   <span style="color:#e74c3c">失败 ${failed}</span> | 
                   通过率 ${rate}%</p>
                
                <h3>性能指标</h3>
                <table>
                    <tr><th>指标</th><th>耗时</th><th>状态</th></tr>
            `;
            
            const metrics = allResults.performance.metrics || {};
            for (const [key, value] of Object.entries(metrics)) {
                const status = value < 500 ? '<span class="badge badge-low">优秀</span>' : 
                              value < 1000 ? '<span class="badge badge-medium">良好</span>' : 
                              '<span class="badge badge-high">需优化</span>';
                html += `<tr><td>${key}</td><td>${value.toFixed(2)}ms</td><td>${status}</td></tr>`;
            }
            
            html += `</table>`;
            
            if (failed > 0) {
                html += `<h3 style="color:#e74c3c">失败的测试</h3><table><tr><th>模块</th><th>测试项</th></tr>`;
                ['unit', 'integration', 'performance'].forEach(type => {
                    allResults[type].results.forEach(r => {
                        if (r.status === 'fail') {
                            html += `<tr><td>${type}</td><td>${r.name}</td></tr>`;
                        }
                    });
                });
                html += `</table>`;
            }
            
            // 发布建议
            const canRelease = failed === 0 && rate >= 95;
            html += `
                <h3>📋 发布建议</h3>
                <p style="font-size: 18px; padding: 15px; background: ${canRelease ? 'rgba(46,204,113,0.2)' : 'rgba(231,76,60,0.2)'}; 
                    border-radius: 5px; color: ${canRelease ? '#2ecc71' : '#e74c3c'}">
                    ${canRelease ? '✅ 可以发布 - 所有测试通过，性能良好' : '⚠️ 暂不建议发布 - 存在失败的测试或性能问题'}
                </p>
            `;
            
            reportContent.innerHTML = html;
            reportSection.style.display = 'block';
            log('测试报告已生成', 'success');
        }
        
        function resetTests() {
            allResults = {
                unit: { passed: 0, failed: 0, results: [] },
                integration: { passed: 0, failed: 0, results: [] },
                performance: { passed: 0, failed: 0, results: [], metrics: {} }
            };
            document.getElementById('results').innerHTML = '';
            document.getElementById('log').innerHTML = '';
            document.getElementById('report-section').style.display = 'none';
            updateSummary();
            log('已重置', 'info');
        }
        
        // 自动运行
        window.addEventListener('load', () => {
            log('测试套件加载完成', 'success');
            log('点击"运行全部测试"开始测试', 'info');
        });
    </script>
    
    <!-- 加载游戏模块 -->
    <script src="../core/Input.js"></script>
    <script src="../core/GameLoop.js"></script>
    <script src="../core/Scene.js"></script>
    <script src="../entities/Skill.js"></script>
    <script src="../entities/Player.js"></script>
    <script src="../entities/Enemy.js"></script>
    <script src="../ai/EnemyAI.js"></script>
    <script src="../ui/HUD.js"></script>
    <script src="../game.js"></script>
    
    <!-- 加载测试模块 -->
    <script src="unit/test-input.js"></script>
    <script src="unit/test-gameloop.js"></script>
    <script src="unit/test-player.js"></script>
    <script src="unit/test-enemy.js"></script>
    <script src="unit/test-hud.js"></script>
    <script src="unit/test-skill.js"></script>
    <script src="integration/test-collision.js"></script>
    <script src="integration/test-combat.js"></script>
    <script src="integration/test-scene.js"></script>
    <script src="performance/test-performance.js"></script>
</body>
</html>
